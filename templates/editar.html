<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercia - Editar Produto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #2c2c2a; }
        header { background: #185FA5; color: white; padding: 1rem 2rem; font-size: 1.3rem; font-weight: 600; letter-spacing: 0.5px; }
        main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: white; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #185FA5; }
        form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        form input, form select { padding: 8px 12px; border: 0.5px solid #b4b2a9; border-radius: 8px; font-size: 14px; background: #f4f6f9; color: #2c2c2a; outline: none; transition: border 0.2s; }
        form input:focus, form select:focus { border-color: #185FA5; background: white; }
        form input[name="nome"]      { flex: 2; min-width: 140px; }
        form input[name="descricao"] { flex: 3; min-width: 160px; }
        form input[name="preco"]     { flex: 1; min-width: 100px; }
        form select                  { flex: 1; min-width: 130px; }
        .btn { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #185FA5; color: white; }
        .btn-cancel  { background: #f1efe8; color: #444441; border: 0.5px solid #d3d1c7; }
        .back-link { display: inline-block; margin-bottom: 1rem; font-size: 13px; color: #185FA5; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<header>🏪 COMMERCIA — Gestão de Estoque</header>

<main>
    <a href="/" class="back-link">← Voltar para o estoque</a>

    <div class="card">
        <h2>✏ Editar Produto #{{ produto.id }}</h2>
        <form method="POST" action="/editar/{{ produto.id }}">
            <input type="text" name="nome" value="{{ produto.nome }}" placeholder="Nome do produto" required>
            <input type="text" name="descricao" value="{{ produto.descricao or '' }}" placeholder="Descrição">
            <input type="text" name="preco" value="{{ '%.2f' | format(produto.valor) }}" placeholder="Preço" required>
            <select name="categoria">
                <option value="1" {% if produto.categoria_id == 1 %}selected{% endif %}>Eletrônicos</option>
                <option value="2" {% if produto.categoria_id == 2 %}selected{% endif %}>Alimentos</option>
                <option value="3" {% if produto.categoria_id == 3 %}selected{% endif %}>Limpeza</option>
            </select>
            <button type="submit" class="btn btn-primary">Salvar alterações</button>
            <a href="/" class="btn btn-cancel">Cancelar</a>
        </form>
    </div>
</main>

</body>
</html>
